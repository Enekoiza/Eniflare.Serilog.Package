name: release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history + tags so MinVer can compute the version

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build -c Release --no-restore

      - name: Test
        run: dotnet test -c Release --no-build --verbosity normal

      - name: Pack
        run: dotnet pack src/Eniflare.Serilog/Eniflare.Serilog.csproj -c Release --no-build -o artifacts

      # --- Publish to NuGet.org (requires a NUGET_API_KEY repo secret) ---
      # The .snupkg symbol package is pushed automatically alongside the .nupkg
      # when both sit in the same folder, so a single push covers symbols too.
      - name: Push to NuGet.org
        run: |
          dotnet nuget push "artifacts/*.nupkg" \
            --source https://api.nuget.org/v3/index.json \
            --api-key "${{ secrets.NUGET_API_KEY }}" --skip-duplicate

      # --- To publish to GitHub Packages (Enekoiza org) instead, use: ---
      # - name: Push to GitHub Packages
      #   run: |
      #     dotnet nuget add source --username Enekoiza --password "${{ secrets.GITHUB_TOKEN }}" \
      #       --store-password-in-clear-text --name github \
      #       "https://nuget.pkg.github.com/Enekoiza/index.json"
      #     dotnet nuget push "artifacts/*.nupkg" --source github --api-key "${{ secrets.GITHUB_TOKEN }}" --skip-duplicate
      #     dotnet nuget push "artifacts/*.snupkg" --source github --api-key "${{ secrets.GITHUB_TOKEN }}" --skip-duplicate
